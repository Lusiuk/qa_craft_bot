require:
  - rubocop-performance
  - rubocop-rspec
  - rubocop-factory_bot

AllCops:
  TargetRubyVersion: 3.3
  NewCops: enable
  SuggestExtensions: false # Убираем подсказки про rubocop-rake
  Exclude:
    - 'vendor/**/*'
    - 'db/schema.rb'
    - 'bin/*'

# Ботам не обязательно комментировать каждый класс
Style/Documentation:
  Enabled: false

Metrics/AbcSize:
  Max: 45
# FSM-классы (AuthorFSM, StudentFSM)
Metrics/ClassLength:
  Max: 300
  Exclude:
    - 'app/state_machines/**/*'

Metrics/MethodLength:
  Max: 30
  Exclude:
    - 'app/state_machines/**/*'
    - 'app/bot_processor.rb'

Metrics/BlockLength:
  Max: 50
  Exclude:
    - 'spec/**/*'
    - 'app/state_machines/**/*'

Metrics/CyclomaticComplexity:
  Max: 20
  Exclude:
    - 'app/state_machines/**/*'
Metrics/PerceivedComplexity:
  Max: 20
Metrics/ParameterLists:
  Max: 8  # Репозитории часто принимают много параметров

# Разрешаем длинные строки
Layout/LineLength:
  Max: 140
Layout/EndOfLine:
  EnforcedStyle: lf

# Разрешаем префиксы get_/set_ (удобно для методов API)
Naming/AccessorMethodName:
  Enabled: false

RSpec/DescribeClass:
  Enabled: false  # Тесты сценариев описывают поведение, а не один класс
RSpec/ExampleLength:
  Max: 50         # Интеграционные тесты длинные
RSpec/MultipleExpectations:
  Max: 25         # В одном сценарии проверяется цепочка ответов бота
FactoryBot/CreateList:
  Enabled: false

Gemspec/DevelopmentDependencies:
  Enabled: false  # Бот не публикуется как gem, dev-зависимости в .gemspec допустимы
